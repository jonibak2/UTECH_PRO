<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>AES шифрование</title>
<style>
body{
font-family:Arial;
background:#111;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:#222;
padding:30px;
border-radius:18px;
width:500px;
}

textarea,input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
}

button{
padding:12px 18px;
margin-top:10px;
border:none;
border-radius:8px;
cursor:pointer;
}

pre{
white-space:pre-wrap;
word-break:break-word;
background:#333;
padding:12px;
border-radius:10px;
margin-top:15px;
}
</style>
</head>
<body>

<div class="box">
<h2>AES-GCM Шифрование</h2>

<textarea id="text">секретное сообщение</textarea>
<input id="password" value="mypassword123">

<button onclick="encryptData()">Зашифровать</button>
<button onclick="decryptData()">Расшифровать</button>

<pre id="output"></pre>
</div>

<script>
let savedEncrypted=null;
let savedIv=null;
let savedSalt=null;

const enc = new TextEncoder();
const dec = new TextDecoder();

function toBase64(buffer){
return btoa(
String.fromCharCode(...new Uint8Array(buffer))
);
}

function fromBase64(base64){
return Uint8Array.from(
atob(base64),
c=>c.charCodeAt(0)
);
}

async function getKey(password,salt){

const keyMaterial=
await crypto.subtle.importKey(
"raw",
enc.encode(password),
{name:"PBKDF2"},
false,
["deriveKey"]
);

return crypto.subtle.deriveKey(
{
name:"PBKDF2",
salt:salt,
iterations:100000,
hash:"SHA-256"
},
keyMaterial,
{
name:"AES-GCM",
length:256
},
false,
["encrypt","decrypt"]
);
}

async function encryptData(){

let text=document.getElementById("text").value;
let password=document.getElementById("password").value;

savedIv=crypto.getRandomValues(new Uint8Array(12));
savedSalt=crypto.getRandomValues(new Uint8Array(16));

let key=await getKey(password,savedSalt);

savedEncrypted=
await crypto.subtle.encrypt(
{
name:"AES-GCM",
iv:savedIv
},
key,
enc.encode(text)
);

document.getElementById("output").textContent=
"Зашифровано:\n\n"+
toBase64(savedEncrypted);
}

async function decryptData(){

if(!savedEncrypted){
alert("Сначала зашифруй текст");
return;
}

let password=document.getElementById("password").value;

try{
let key=await getKey(password,savedSalt);

let decrypted=
await crypto.subtle.decrypt(
{
name:"AES-GCM",
iv:savedIv
},
key,
savedEncrypted
);

document.getElementById("output").textContent=
"Расшифровано:\n\n"+
dec.decode(decrypted);

}catch(e){
document.getElementById("output").textContent=
"Неверный пароль или данные повреждены";
}
}
</script>

</body>
</html>
