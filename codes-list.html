<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>רשימת כתובות וקודים</title>
  <link rel="icon" href="project/assets/logo.jpg" type="image/jpeg" />
  <link rel="apple-touch-icon" href="project/assets/logo.jpg" />
  <meta name="apple-mobile-web-app-title" content="UTECH" />
  <link rel="stylesheet" href="project/css/00-navigation.css" />
  <link rel="stylesheet" href="project/css/01-animations.css" />
  <link rel="stylesheet" href="project/css/02-base.css" />
  <link rel="stylesheet" href="project/css/03-header.css" />
  <style>
    :root {
      --accent: #6ab053;
      --accent-dark: #4f8e3f;
      --surface: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
      --bg: #f5f5f5;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-tap-highlight-color: transparent;
      padding: 20px;
    }

    .page {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 0 40px;
    }

    .header-box {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 10px 24px rgba(17, 24, 39, 0.06);
      margin-bottom: 16px;
      animation: fadeInUp 0.4s ease-out forwards;
    }

    .logo-wrap {
      text-align: center;
      margin-bottom: 14px;
    }

    .logo-wrap img {
      width: 250px;
      height: auto;
    }

    h1 {
      margin: 0 0 14px;
      text-align: center;
      font-size: 26px;
      color: #111827;
    }

    .search-input {
      width: 100%;
      box-sizing: border-box;
      font-size: 16px;
      padding: 13px 14px;
      border-radius: 10px;
      border: 2px solid #d1d5db;
      outline: none;
      transition: border-color .2s ease, box-shadow .2s ease;
    }

    .search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(106, 176, 83, 0.15);
    }

    .meta {
      margin-top: 10px;
      font-size: 14px;
      color: var(--muted);
      text-align: center;
    }

    .list-box {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: 0 10px 24px rgba(17, 24, 39, 0.06);
      overflow: hidden;
      max-height: calc(100vh - 255px);
      overflow-y: auto;
      animation: fadeInUp 0.5s ease-out forwards;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: start;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
    }

    .row:last-child {
      border-bottom: none;
    }

    .row:hover {
      background: #f9fbf8;
    }

    .address {
      font-weight: 600;
      line-height: 1.4;
      color: #111827;
      word-break: break-word;
    }

    .code {
      color: var(--accent-dark);
      background: #eef8ea;
      border: 1px solid #d6eccc;
      border-radius: 12px;
      padding: 4px 10px;
      font-weight: 700;
      font-size: 13px;
      white-space: normal;
      overflow-wrap: anywhere;
      word-break: break-word;
      max-width: 100%;
    }

    .empty {
      padding: 26px;
      text-align: center;
      color: var(--muted);
    }

    @media (max-width: 640px) {
      body {
        padding: 8px;
      }

      .page {
        padding: 10px 10px 18px;
      }

      .header-box {
        position: sticky;
        top: 6px;
        z-index: 10;
        border-radius: 14px;
        padding: 14px 12px;
      }

      .logo-wrap {
        margin-bottom: 10px;
      }

      .logo-wrap img {
        width: 250px;
      }

      h1 {
        font-size: 19px;
        margin-bottom: 10px;
      }

      .search-input {
        font-size: 16px;
        min-height: 46px;
        padding: 11px 12px;
      }

      .meta {
        font-size: 13px;
      }

      .list-box {
        border-radius: 14px;
        max-height: calc(100vh - 180px);
      }

      .row {
        grid-template-columns: 1fr;
        gap: 8px;
        padding: 12px;
      }

      .address {
        font-size: 15px;
      }

      .code {
        justify-self: start;
        font-size: 12px;
        padding: 4px 9px;
      }

      .empty {
        padding: 18px 12px;
      }
    }

    @media (max-width: 380px) {
      h1 {
        font-size: 17px;
      }

      .address {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <button class="nav-hamburger" id="nav-toggle" aria-label="תפריט">
    <span class="hamburger-line"></span>
    <span class="hamburger-line"></span>
    <span class="hamburger-line"></span>
  </button>

  <div class="nav-overlay" id="nav-overlay"></div>

  <nav class="nav-drawer" id="nav-drawer">
    <div class="nav-drawer-header">
      <img src="project/assets/utech.png" alt="Utech" />
      <div class="nav-drawer-title">תפריט</div>
    </div>
    <div class="nav-drawer-items">
      <a href="index.html" class="nav-item schedule" data-page="index">סידור עבודה</a>
      <a href="view.html" class="nav-item logs" data-page="view">יומני עבודה</a>
      <a href="tofes.html" class="nav-item fill-notes" data-page="tofes">מילוי יומן עבודה</a>
      <a href="codes-list.html" class="nav-item building-codes active" data-page="codes-list">קודים לבניינים </a>
      <a href="#" class="nav-item service" data-page="service">קריאות שירות פתוחות</a>
      <a href="#" class="nav-item fill-service" data-page="fill-service">מילוי קריאת שירות</a>
      <a href="#" class="nav-item service-agreement" data-page="service-agreement">הסכמי שירות</a>
      <a href="#" class="nav-item fill-service-agreement" data-page="fill-service-agreement">מילוי הסכמי שירות</a>
    </div>
  </nav>

  <div class="page">
    <div class="header-box">
      <div class="logo-wrap">
        <img src="project/assets/utech.png" alt="Utech" />
      </div>
      <h1>רשימת כתובות וקודי כניסה</h1>
      <input id="searchInput" class="search-input" type="text" placeholder="חיפוש לפי כתובת..." />
      <div id="meta" class="meta"></div>
    </div>

    <div id="list" class="list-box"></div>
  </div>

  <script src="codes.js"></script>
  <script>
    function setupNavigation() {
      const navToggle = document.getElementById("nav-toggle");
      const navDrawer = document.getElementById("nav-drawer");
      const navOverlay = document.getElementById("nav-overlay");
      const navItems = document.querySelectorAll(".nav-item");
      const isDesktop = window.matchMedia("(min-width: 769px)").matches;

      if (!navToggle || !navDrawer || !navOverlay || !navItems.length) return;

      const closeDrawer = () => {
        navToggle.classList.remove("active");
        navDrawer.classList.remove("active");
        navOverlay.classList.remove("active");
      };

      if (!isDesktop) {
        closeDrawer();
        return;
      }

      navToggle.addEventListener("click", () => {
        navToggle.classList.toggle("active");
        navDrawer.classList.toggle("active");
        navOverlay.classList.toggle("active");
      });

      navOverlay.addEventListener("click", closeDrawer);

      navItems.forEach((item) => {
        item.addEventListener("click", closeDrawer);
      });

      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeDrawer();
      });

      window.addEventListener("resize", () => {
        if (!window.matchMedia("(min-width: 769px)").matches) {
          closeDrawer();
        }
      });
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", setupNavigation);
    } else {
      setupNavigation();
    }

    const listEl = document.getElementById("list");
    const searchInput = document.getElementById("searchInput");
    const metaEl = document.getElementById("meta");

    const entries = (Array.isArray(codes) ? codes : [])
      .map((line) => {
        const cleanLine = String(line || "").trim();
        if (!cleanLine) return null;

        const sepIndex = cleanLine.indexOf(" - ");
        if (sepIndex === -1) {
          return { address: cleanLine, code: "—", raw: cleanLine };
        }

        const address = cleanLine.slice(0, sepIndex).trim();
        const code = cleanLine.slice(sepIndex + 3).trim() || "—";
        return { address, code, raw: cleanLine };
      })
      .filter(Boolean);

    function render(query = "") {
      const q = query.trim().toLowerCase();
      const filtered = q
        ? entries.filter((item) => item.address.toLowerCase().includes(q))
        : entries;

      metaEl.textContent = `נמצאו ${filtered.length} מתוך ${entries.length}`;

      if (!filtered.length) {
        listEl.innerHTML = '<div class="empty">לא נמצאו תוצאות</div>';
        return;
      }

      listEl.innerHTML = filtered
        .map(
          (item) => `
            <div class="row">
              <div class="address">${escapeHtml(item.address)}</div>
              <div class="code">${escapeHtml(item.code)}</div>
            </div>
          `
        )
        .join("");
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    searchInput.addEventListener("input", () => {
      render(searchInput.value);
    });

    render();
  </script>
</body>
</html>
